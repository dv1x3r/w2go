<!DOCTYPE html>
<html lang="en">

<head>
  <title>w2go example</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" type="text/css" href="/lib/w2ui.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <div id="main" style="width: 100vw; height: 100vh; min-width: 800px">Loading...</div>
  <script type="module">
    import {w2form, w2grid, w2popup, w2ui, w2utils} from '/lib/w2ui.es6.min.js'

    window.w2ui = w2ui
    w2utils.settings.dataType = 'JSON'
    w2utils.formatters['text'] = (_, extra) => w2utils.encodeTags(String(extra.value ?? ''))
    w2utils.formatters['dropdown'] = (_, extra) => w2utils.encodeTags(String(extra.value?.text ?? ''))

    function remoteListOptions(url) {
      return {
        url: url,
        type: 'list',
        recId: 'id',
        match: 'contains',
        align: 'left',
        cacheMax: 5000,
        minLength: 0,
        openOnFocus: true,
        renderDrop: value => w2utils.encodeTags(value?.text),
      }
    }

    new w2grid({
      name: 'todoGrid',
      box: '#main',
      url: {
        get: '/api/v1/todo/grid/records',
        save: '/api/v1/todo/grid/save',
        remove: '/api/v1/todo/grid/remove',
      },
      recid: 'id',
      multiSearch: true,
      show: {
        footer: true,
        toolbar: true,
        toolbarAdd: true,
        toolbarEdit: true,
        toolbarDelete: true,
        toolbarSave: true,
        toolbarSearch: true,
        toolbarReload: true,
        searchSave: false,
      },
      toolbar: {
        items: [
          {type: 'break'},
          {
            id: 'status',
            type: 'button',
            text: 'Status Enum',
            icon: 'w2ui-icon-settings',
            onClick: () => openStatusPopup(),
          },
        ],
      },
      columns: [
        {
          field: 'id',
          text: 'ID',
          size: '60px',
          sortable: true,
          searchable: 'int',
        },
        {
          field: 'name',
          text: 'Name',
          render: 'text',
          size: '250px',
          sortable: true,
          searchable: 'text',
        },
        {
          field: 'description',
          text: 'Description',
          render: 'text',
          size: '400px',
          sortable: true,
          searchable: 'text',
          editable: {type: 'text'},
        },
        {
          field: 'status',
          text: 'Status',
          render: 'dropdown',
          size: '88px',
          sortable: true,
          searchable: {type: 'enum', options: remoteListOptions('/api/v1/status/dropdown')},
          editable: remoteListOptions('/api/v1/status/dropdown'),
        },
        {
          field: 'quantity',
          text: 'Quantity',
          render: 'int',
          size: '88px',
          sortable: true,
          searchable: 'int',
          editable: {type: 'int'},
        },
      ],
      defaultOperator: {
        'text': 'contains',
      },
      sortData: [
        {field: 'id', direction: 'asc'},
      ],
      onAdd: function (event) {openTodoPopup(event)},
      onEdit: function (event) {openTodoPopup(event)},
      onSave: function (event) {
        event.onComplete = () => {
          if (event.detail.data?.status == 'success') {
            event.owner.reload()
          }
        }
      },
      onDblClick: function (event) {
        const isEditable = column => Object.keys(column.editable).length > 0
        if (!isEditable(event.owner.columns[event.detail.column])) {
          openTodoPopup(event)
        }
      },
    })

    function openTodoPopup(event) {
      const todoForm = new w2form({
        name: `todoForm`,
        url: '/api/v1/todo/form',
        recid: event.detail.recid,
        fields: [
          {
            field: 'id',
            type: 'text',
            hidden: event.type == 'add',
            html: {
              label: 'ID',
              attr: 'size="10" readonly',
              span: 4,
            },
          },
          {
            field: 'name',
            type: 'text',
            required: true,
            html: {
              label: 'Name',
              attr: 'style="width:100%; min-width:100px;',
              span: 4,
            },
          },
          {
            field: 'description',
            type: 'text',
            required: true,
            html: {
              label: 'Description',
              attr: 'style="width:100%; min-width:100px;',
              span: 4,
            },
          },
          {
            field: 'status',
            type: 'list',
            required: true,
            options: remoteListOptions('/api/v1/status/dropdown'),
            html: {
              label: 'Status',
              attr: 'style="width:100%; min-width:100px;',
              span: 4,
            },
          },
          {
            field: 'quantity',
            type: 'int',
            required: true,
            html: {
              label: 'Quantity',
              attr: 'style="width:100%; min-width:100px;',
              span: 4,
            },
          },
        ],
        actions: {
          async Save() {
            const res = await this.save()
            if (res.status == 'success') {
              event.owner.reload()
              w2popup.close()
            }
          },
          Cancel() {w2popup.close()},
        },
      })

      w2popup.open({
        title: event.type == 'add' ? 'New Todo' : 'Edit Todo',
        body: '<div id="todo-form" style="width: 100%; height: 100%;"></div>',
        width: 500, height: 350, showMax: true, resizable: true,
      })
        .then(() => todoForm.render('#todo-form'))
        .close(() => todoForm.destroy())
    }

    function openStatusPopup() {
      const statusGrid = new w2grid({
        name: 'statusGrid',
        url: '/api/v1/status/grid/records',
        recid: 'id',
        reorderRows: true,
        show: {
          footer: true,
          toolbar: false,
        },
        columns: [
          {
            field: 'id',
            text: 'ID',
            size: '60px',
          },
          {
            field: 'name',
            text: 'Name',
            render: 'text',
            size: '250px',
          },
        ],
        onReorderRow: function (event) {
          fetch('/api/v1/status/grid/reorder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(event.detail),
          })
        },
      })

      w2popup.open({
        title: 'Status Enum',
        body: '<div id="status-grid" style="width: 100%; height: 100%;"></div>',
        width: 500, height: 350, showMax: true, resizable: true,
      })
        .then(() => statusGrid.render('#status-grid'))
        .close(() => statusGrid.destroy())
    }
  </script>
</body>

</html>
